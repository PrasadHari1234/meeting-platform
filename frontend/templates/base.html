<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Meeting Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; }
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; }
    .badge-high   { background: rgba(220,38,38,.15); color: #f87171; border: 1px solid rgba(220,38,38,.3); }
    .badge-medium { background: rgba(217,119,6,.15);  color: #fbbf24; border: 1px solid rgba(217,119,6,.3); }
    .badge-low    { background: rgba(22,163,74,.15);  color: #4ade80; border: 1px solid rgba(22,163,74,.3); }
    .badge-open   { background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
    .badge-done   { background: rgba(22,163,74,.15);  color: #4ade80; border: 1px solid rgba(22,163,74,.3); }
    .nav-link { color: #94a3b8; transition: color .2s; }
    .nav-link:hover, .nav-link.active { color: #e2e8f0; }
    .btn-primary { background: #1d4ed8; color: white; border-radius: 10px; padding: 10px 20px; font-weight: 600; transition: background .2s; }
    .btn-primary:hover { background: #1e40af; }
    .status-dot-processing { animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body class="min-h-screen">

  <!-- Sidebar -->
  <div class="flex">
    <aside class="w-56 min-h-screen fixed left-0 top-0 border-r border-slate-800 flex flex-col py-6 px-4"
           style="background:#13151f">
      <div class="mb-8 px-2">
        <div class="flex items-center gap-2">
          <span class="text-2xl">🎙️</span>
          <span class="font-bold text-white text-lg">MeetingAI</span>
        </div>
        <p class="text-xs text-slate-500 mt-1">Powered by Claude</p>
      </div>

      <nav class="flex flex-col gap-1 flex-1">
        <a href="/dashboard"     class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 {% if active == 'dashboard' %}active bg-slate-800{% endif %}">
          <span>📊</span> Dashboard
        </a>
        <a href="/action-items"  class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 {% if active == 'actions' %}active bg-slate-800{% endif %}">
          <span>✅</span> Action Items
        </a>
        <a href="/upcoming"      class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-800 {% if active == 'upcoming' %}active bg-slate-800{% endif %}">
          <span>📅</span> Upcoming
        </a>
      </nav>

      {% if user %}
      <div class="mt-auto pt-4 border-t border-slate-800">
        <div class="flex items-center gap-2 px-2">
          {% if user.avatar %}
          <img src="{{ user.avatar }}" class="w-8 h-8 rounded-full">
          {% else %}
          <div class="w-8 h-8 rounded-full bg-blue-700 flex items-center justify-center text-sm font-bold text-white">
            {{ user.name[0].upper() }}
          </div>
          {% endif %}
          <div class="overflow-hidden">
            <p class="text-sm font-medium text-slate-200 truncate">{{ user.name }}</p>
            <a href="/auth/logout" class="text-xs text-slate-500 hover:text-slate-300">Sign out</a>
          </div>
        </div>
      </div>
      {% endif %}
    </aside>

    <!-- Main content -->
    <main class="ml-56 flex-1 min-h-screen">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
